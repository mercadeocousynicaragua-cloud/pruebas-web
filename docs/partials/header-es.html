<div class="container relative">
  <div class="flex h-20 items-center justify-between gap-4">
    <a href="./" data-nav-route="home" class="flex items-center gap-3">
      <img
        data-nav-asset="logo"
        src="../assets/logo-cousy.webp"
        alt="Logo de Cousy Nicaragua"
        class="h-12 w-12"
        style="height: 3.6rem; width: 3.6rem"
      />
      <span class="sr-only">Cousy Nicaragua</span>
    </a>

    <nav class="js-site-nav ml-auto hidden items-center gap-10 text-sm sm:flex">
      <a class="js-nav-link text-brand-ink hover:text-brand-accent" data-nav-route="home" href="./">Inicio</a>
      <a class="js-nav-link text-brand-ink hover:text-brand-accent" data-nav-route="store" href="./tienda">Tienda</a>
      <a class="js-nav-link text-brand-ink hover:text-brand-accent" data-nav-route="successCases" href="./casos-de-exito">Casos de éxito</a>
      <a class="js-nav-link text-brand-ink hover:text-brand-accent" data-nav-route="about" href="./nosotros">Nosotros</a>
      <a class="js-nav-link text-brand-ink hover:text-brand-accent" data-nav-route="sustainability" href="./sostenibilidad">Sostenibilidad</a>
      <a
        data-nav-route="quote"
        href="./cotizacion"
        class="js-quote-link relative inline-flex h-11 w-11 items-center justify-center rounded-xl hover:bg-black/5"
        aria-label="Cotización"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          class="h-6 w-6"
        >
          <path d="M6 7h12l-1 14H7L6 7Z" />
          <path d="M9 7a3 3 0 0 1 6 0" />
        </svg>
        <span
          data-cart-count
          class="hidden absolute -right-1 -top-1 rounded-full bg-brand-accent px-2 py-0.5 text-xs font-semibold text-white"
          >0</span
        >
      </a>
    </nav>

    <button
      type="button"
      class="ml-auto inline-flex h-11 w-11 items-center justify-center rounded-xl hover:bg-black/5 sm:hidden"
      data-mobile-menu-toggle
      aria-label="Abrir menú"
      aria-controls="mobile-menu-es"
      aria-expanded="false"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.8"
        class="h-6 w-6"
        data-menu-icon="open"
      >
        <path d="M4 7h16" />
        <path d="M4 12h16" />
        <path d="M4 17h16" />
      </svg>
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.8"
        class="hidden h-6 w-6"
        data-menu-icon="close"
      >
        <path d="M6 6l12 12" />
        <path d="M18 6 6 18" />
      </svg>
    </button>
  </div>

  <nav
    id="mobile-menu-es"
    data-mobile-menu
    aria-label="Menú móvil"
    class="fixed inset-x-0 bottom-0 top-20 z-40 hidden bg-white sm:hidden"
  >
    <div
      data-mobile-menu-panel
      class="h-full max-h-0 overflow-y-auto border-b border-black/10 bg-white p-0 opacity-0 transition-[max-height,opacity,padding] duration-300 ease-out"
    >
      <ul class="flex flex-col p-3 text-center">
        <li>
          <a class="js-nav-link block rounded-xl px-3 py-3 text-lg text-brand-ink hover:bg-brand-muted" data-nav-route="home" href="./"
            >Inicio</a
          >
        </li>
        <li>
          <a class="js-nav-link block rounded-xl px-3 py-3 text-lg text-brand-ink hover:bg-brand-muted" data-nav-route="store" href="./tienda"
            >Tienda</a
          >
        </li>
        <li>
          <a class="js-nav-link block rounded-xl px-3 py-3 text-lg text-brand-ink hover:bg-brand-muted" data-nav-route="successCases" href="./casos-de-exito"
            >Casos de éxito</a
          >
        </li>
        <li>
          <a class="js-nav-link block rounded-xl px-3 py-3 text-lg text-brand-ink hover:bg-brand-muted" data-nav-route="about" href="./nosotros"
            >Nosotros</a
          >
        </li>
        <li>
          <a
            class="js-nav-link block rounded-xl px-3 py-3 text-lg text-brand-ink hover:bg-brand-muted"
            data-nav-route="sustainability"
            href="./sostenibilidad"
            >Sostenibilidad</a
          >
        </li>
      </ul>
      <div class="px-3 pb-16 text-center">
        <a
          data-mobile-quote-link
          data-nav-route="quote"
          href="./cotizacion"
          class="js-quote-link relative mb-5 inline-flex h-12 w-full items-center justify-center rounded-xl px-5 text-sm font-semibold text-brand-accent transition duration-300"
        >
          Ir a cotización
          <span
            data-cart-count
            class="hidden absolute -right-2 -top-2 rounded-full bg-brand-accent px-2 py-0.5 text-xs font-semibold text-white"
            >0</span
          >
        </a>
      </div>
    </div>
  </nav>
</div>
